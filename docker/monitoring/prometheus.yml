# Prometheus 설정
# Kafka와 Spark Streaming 메트릭 수집

global:
  scrape_interval: 15s          # 15초마다 메트릭 수집
  evaluation_interval: 15s      # 15초마다 규칙 평가
  external_labels:
    monitor: 'comerce-kafka-monitoring'

# Alertmanager 설정 (선택사항)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# 메트릭 수집 대상
scrape_configs:
  # Prometheus 자신의 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kafka JMX Metrics - Kafka 브로커 JMX 메트릭
  - job_name: 'kafka-jmx'
    static_configs:
      - targets:
          - 'kafka-broker-1:9999'
          - 'kafka-broker-2:9998'
          - 'kafka-broker-3:9997'
        labels:
          cluster: 'kafka-cluster'
