# Filebeat Configuration
# 프로젝트 전체 로그를 Elasticsearch로 수집

filebeat.inputs:

# 1️⃣ Producer 로그
- type: log
  enabled: true
  paths:
    - /logs/producer/*.log
  fields:
    module: producer
    service: kafka-producer
  close_inactive: 1h

# 2️⃣ Consumer 로그
- type: log
  enabled: true
  paths:
    - /logs/consumer/*.log
  fields:
    module: consumer
    service: postgres-consumer
  close_inactive: 1h

# 3️⃣ Spark 로그
- type: log
  enabled: true
  paths:
    - /logs/spark/*.log
  fields:
    module: spark
    service: spark-streaming
  close_inactive: 1h

# 4️⃣ Airflow 로그
- type: log
  enabled: true
  paths:
    - /logs/airflow/**/*.log
  fields:
    module: airflow
    service: airflow-dag
  close_inactive: 1h

# 5️⃣ ML 로그
- type: log
  enabled: true
  paths:
    - /logs/ml/*.log
  fields:
    module: ml
    service: ml-training
  close_inactive: 1h

# Elasticsearch 출력 설정
output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "comerce-kafka-%{+yyyy.MM.dd}"

# Index template 설정
setup.template:
  name: "comerce-kafka"
  pattern: "comerce-kafka-*"
  enabled: true
  overwrite: true

# 프로세서 설정
processors:
  - add_host_metadata: ~
  - add_fields:
      target: ''
      fields:
        project: "comerce-kafka"
        environment: "docker"

# 로깅 설정
logging.level: info
